name: CI (Development Server)

on:
  pull_request:
    branches: ["develop"]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Create .env file
        run: echo "${{ secrets.DEV_ENV_FILE }}" > .env
        shell: bash

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: Run build and test
        run: ./gradlew clean build --no-daemon

      - name: Login to DockerHub
        run: echo "${{ secrets.DEV_DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DEV_DOCKER_USERNAME }}" --password-stdin

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.DEV_DOCKER_REPO }}:latest .
          docker push ${{ secrets.DEV_DOCKER_REPO }}:latest

      - name: Logout from DockerHub
        if: always()
        run: docker logout