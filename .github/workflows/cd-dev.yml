name: CD (Development Server)

on:
  push:
    branches: ["develop"]

jobs:
  build:
    name: Prepare Deployment Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Create .env file
        run: echo "${{ secrets.DEV_ENV_FILE }}" > .env
        shell: bash

      - name: Archive deployment files
        run: |
          mkdir deploy
          mv .env deploy/
          cp docker-compose-dev.yml deploy/docker-compose.yml
          cp redis.conf deploy/
          cp -r src/main/resources/db deploy/
          cp -r monitoring deploy/
          cp -r nginx deploy/
          tar -czvf deploy.tar.gz -C deploy .
        shell: bash

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-files
          path: deploy.tar.gz

  deploy:
    name: Deploy to DEV EC2
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download deployment files
        uses: actions/download-artifact@v5
        with:
          name: deployment-files
          path: .

      - name: Extract deployment files
        run: |
          tar -xzvf deploy.tar.gz
          ls -al

      - name: Copy files to DEV server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DEV_SSH_HOST }}
          username: ${{ secrets.DEV_SSH_USERNAME }}
          key: ${{ secrets.DEV_SSH_KEY }}
          port: 22
          source: "docker-compose.yml,.env,redis.conf,db,monitoring,nginx"
          target: "/home/ubuntu/troublog/"

      - name: Deploy to DEV EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEV_SSH_HOST }}
          username: ${{ secrets.DEV_SSH_USERNAME }}
          key: ${{ secrets.DEV_SSH_KEY }}
          port: 22
          command_timeout: 30m
          script: |
            cd /home/ubuntu/troublog
            
            # logs 디렉토리 생성
            mkdir -p logs

            # Certbot webroot 디렉토리 생성 (HTTP-01 Challenge용)
            mkdir -p certbot/www

            # Docker 로그인
            echo ${{ secrets.DEV_DOCKER_PASSWORD }} | sudo docker login -u ${{ secrets.DEV_DOCKER_USERNAME }} --password-stdin

            # Flyway 마이그레이션 선행 실행
            DB_URL="$(grep '^DEV_DB_URL=' .env | cut -d= -f2-)"
            DB_USER="$(grep '^DEV_DB_USERNAME=' .env | cut -d= -f2-)"
            DB_PASSWORD="$(grep '^DEV_DB_PASSWORD=' .env | cut -d= -f2-)"

            if [ -z "$DB_URL" ] || [ -z "$DB_USER" ] || [ -z "$DB_PASSWORD" ]; then
              echo "Missing DEV DB credentials in .env"
              exit 1
            fi

            sudo docker run --rm \
              -v /home/ubuntu/troublog/db/migration:/flyway/sql:ro \
              flyway/flyway:11 \
              -url="$DB_URL" \
              -user="$DB_USER" \
              -password="$DB_PASSWORD" \
              -locations=filesystem:/flyway/sql \
              -baselineOnMigrate=true \
              migrate
            
            # 기존 컨테이너 종료
            sudo docker-compose down || true
            
            # 새 이미지 받기
            sudo docker-compose pull
            
            # 컨테이너 재시작
            sudo docker-compose up -d
            
            # 사용하지 않는 이미지 정리
            sudo docker image prune -f
            
            # 컨테이너 상태 확인
            sudo docker-compose ps
            
            # 로그 확인 (최근 20줄)
            sudo docker-compose logs --tail=20
