# prod 환경입니다. application-prod.yml
spring:
  config:
    import: optional:file:.env[.properties]
  flyway:
    baseline-on-migrate: true
  datasource:
    url: ${PROD_DB_URL}
    username: ${PROD_DB_USERNAME}
    password: ${PROD_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: never
  jpa:
    properties:
      hibernate:
        show_sql: false  # 프로덕션에서는 SQL 로깅 비활성화
        format_sql: false
        use_sql_comments: false
        hbm2ddl:
          auto: validate
        default_batch_fetch_size: 1000
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false
  data:
    redis:
      host: redis # redis container 이름
      port: 6379
  security:
    oauth2:
      client:
        registration:
          kakao:
            redirect-uri: "https://troublog.shop/login/oauth2/code/kakao"

# Prompt 설정(Dev)
ai:
  prompts:
    system: ${AI_PROMPT_SYSTEM}
    resume: ${AI_PROMPT_RESUME}
    interview: ${AI_PROMPT_INTERVIEW}
    memoirs: ${AI_PROMPT_MEMOIRS}
    issue-management: ${AI_PROMPT_ISSUE_MANAGEMENT}

# Actuator 모니터링 설정 (프로덕션)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized  # 프로덕션: 인증된 경우만 상세정보 노출
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
    tags:
      application: ${spring.application.name}
      environment: production
