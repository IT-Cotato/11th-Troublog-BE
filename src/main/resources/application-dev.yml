# dev환경입니다. application-dev.yml
spring:
  config:
    import: optional:file:.env[.properties]
  flyway:
    baseline-on-migrate: true
  datasource:
    url: ${DEV_DB_URL}
    username: ${DEV_DB_USERNAME}
    password: ${DEV_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: never
  jpa:
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        use_sql_comments: true
        hbm2ddl:
          auto: validate
        default_batch_fetch_size: 1000
    open-in-view: false
  data:
    redis:
      host: redis # redis container 이름
      port: 6379
  security:
    oauth2:
      client:
        registration:
          kakao:
            redirect-uri: "https://troublog.cloud/login/oauth2/code/kakao"

# Prompt 설정 (Dev)
ai:
  prompts:
    system: ${AI_PROMPT_SYSTEM}
    resume: ${AI_PROMPT_RESUME}
    interview: ${AI_PROMPT_INTERVIEW}
    memoirs: ${AI_PROMPT_MEMOIRS}
    issue-management: ${AI_PROMPT_ISSUE_MANAGEMENT}

# Actuator 모니터링 설정 (Dev)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
    tags:
      application: ${spring.application.name}
      environment: development
