<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Troublog 신고접수</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f6f7fb; padding: 24px;">
	<div style="max-width: 640px; margin: 0 auto; background: #ffffff; padding: 24px; border-radius: 8px;">
		<h2 style="margin: 0 0 16px 0;">신고가 접수되었습니다.</h2>
		<p style="margin: 0 0 16px 0; color: #555555;">새로운 신고가 접수되었습니다.</p>
		<table style="width: 100%; border-collapse: collapse; font-size: 14px;">
			<tr>
				<td style="padding: 8px; border-bottom: 1px solid #e6e6e6;">신고한 유저 ID</td>
				<td style="padding: 8px; border-bottom: 1px solid #e6e6e6;">{{reportingUserId}}</td>
			</tr>
			<tr>
				<td style="padding: 8px; border-bottom: 1px solid #e6e6e6;">신고당한 유저 ID</td>
				<td style="padding: 8px; border-bottom: 1px solid #e6e6e6;">{{reportedUserId}}</td>
			</tr>
			<tr>
				<td style="padding: 8px; border-bottom: 1px solid #e6e6e6;">신고대상 (게시글, 댓글)</td>
				<td style="padding: 8px; border-bottom: 1px solid #e6e6e6;">{{targetType}}</td>
			</tr>
			<tr>
				<td style="padding: 8px; border-bottom: 1px solid #e6e6e6;">신고대상 ID</td>
				<td style="padding: 8px; border-bottom: 1px solid #e6e6e6;">{{targetId}}</td>
			</tr>
			<tr>
				<td style="padding: 8px; border-bottom: 1px solid #e6e6e6;">신고 유형</td>
				<td style="padding: 8px; border-bottom: 1px solid #e6e6e6;">{{reportType}}</td>
			</tr>
			<tr>
				<td style="padding: 8px;">신고 접수 시각</td>
				<td style="padding: 8px;">{{reportedAt}}</td>
			</tr>
		</table>
	</div>
</body>
</html>
